[phases.setup]
nixPkgs = ["python311", "postgresql", "openssl", "libffi", "gcc"]

[phases.install]
cmds = [
  "curl -sS https://bootstrap.pypa.io/get-pip.py | python3.11",
  "python3.11 -m pip install -e apps/api"
]

[start]
cmd = "cd apps/api && python3.11 -m alembic upgrade head && python3.11 -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
